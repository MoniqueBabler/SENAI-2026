<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKZ 💎</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>KICKZ 💎</h1>
    <button onclick="cadastro.classList.remove('oculto')">Adicionar produto</button>
</header>

<main id="cards"></main>

<!-- CADASTRO -->
<div id="cadastro" class="modal oculto">
    <div class="janela">
        <h2>Adicionar produto</h2>

        <form id="formCad">
            <label>Nome</label>
            <input type="text" id="nome" required>

            <label>Categoria</label>
            <select id="tipo" required>
                <option value="">Selecione...</option>
                <option value="corrida">Corrida</option>
                <option value="casual">Casual</option>
                <option value="skate">Skate</option>
                <option value="treino">Treino</option>
            </select>

            <label>Imagem</label>
            <input type="text" id="imagem">

            <label>Marca</label>
            <input type="text" id="marca">

            <label>Gênero</label>
            <input type="text" id="genero">

            <label>Preço</label>
            <input type="number" step="0.01" id="preco">

            <br><br>

            <button type="button" onclick="cadastro.classList.add('oculto')">Cancelar</button>
            <button type="submit">Salvar</button>
        </form>
    </div>
</div>


<div id="detalhes" class="modal oculto">
    <div class="janela">
        <h2 id="tituloReceita"></h2>
        <img id="imgReceita">

        <input type="text" id="nomeEdit">
        <input type="text" id="imgEdit">

        <select id="tipoEdit">
            <option value="">Selecione...</option>
            <option value="corrida">Corrida</option>
            <option value="casual">Casual</option>
            <option value="skate">Skate</option>
            <option value="treino">Treino</option>
        </select>

        <input type="text" id="marcaEdit">
        <input type="text" id="colecaoEdit">
        <input type="number" id="custoEdit">

        <br><br>
        <button onclick="salvarEdicao()">Salvar</button>
        <button onclick="excluirTenisAtual()">Excluir</button>
        <button onclick="detalhes.classList.add('oculto')">Fechar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
