<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora de Filmes</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <h1>Locadora - Cadastro de Filmes</h1>
        <button onclick="abrirModal()">+ Novo Filme</button>
        
        <select id="filtroGenero" onchange="filtrarPorGenero()">
            <option value="">Todos os Gêneros</option>
            <option value="Ação">Ação</option>
            <option value="Comédia">Comédia</option>
            <option value="Drama">Drama</option>
            <option value="Terror">Terror</option>
            <option value="Romance">Romance</option>
        </select>
    </header>

    <main>
        <table>
            <thead>
                <tr>
                    <th>Capa</th>
                    <th>Nome</th>
                    <th>Gênero</th>
                    <th>Ano</th>
                    <th>Classificação</th>
                    <th>Produtora</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="dados"></tbody>
        </table>
    </main>

    <!-- Modal -->
    <div id="modal" class="modal">
        <form id="cadFilme" class="modal-content">
            <h2>Novo Filme</h2>
            <input type="text" name="capa" placeholder="URL da Capa" required>
            <input type="text" name="nome" placeholder="Nome do Filme" required>
            <input type="text" name="genero" placeholder="Gênero" required>
            <input type="number" name="ano" placeholder="Ano" required>
            <input type="text" name="classificacao" placeholder="Classificação" required>
            <input type="text" name="produtora" placeholder="Produtora" required>

            <div class="modal-buttons">
                <button type="submit">Salvar</button>
                <button type="reset" onclick="fecharModal()">Cancelar</button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
